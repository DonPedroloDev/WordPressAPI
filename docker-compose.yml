services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_net
  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DEBUG: "1"
      WORDPRESS_DEBUG_DISPLAY: "0"
      WORDPRESS_DEBUG_LOG: "1"
    volumes:
      - wp_data:/var/www/html
      - ./themes:/var/www/html/wp-content/themes/mi-tema
      - ./plugins:/var/www/html/wp-content/plugins/mi-plugin
    networks:
      - wp_net
volumes:
  db_data:
  wp_data:

networks:
  wp_net:
    driver: bridge
